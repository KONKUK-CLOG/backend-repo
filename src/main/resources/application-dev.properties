# --- 로컬/개발 전용 (운영 배포에 사용 금지) ---
# RDS 비밀번호·JWT 등이 파일에 기본값으로만 존재 — 실서비스는 prod + 환경 변수만 사용

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:clog}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:dev-change-me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 개발용 기본 시크릿 — 반드시 로컬에서만 사용 (저장소에 노출됨)
jwt.secret=${JWT_SECRET:dev-only-jwt-secret-minimum-32-characters-long!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

aws.lambda.function-name=${AWS_LAMBDA_FUNCTION_NAME:clog-llm-generator}
aws.lambda.region=${AWS_REGION:ap-northeast-2}

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/clog}
spring.data.mongodb.database=${MONGODB_DATABASE:clog}

app.blog.public-base-url=${APP_BLOG_PUBLIC_BASE_URL:http://localhost:3000/blog}
app.chat.max-context-tokens=${APP_CHAT_MAX_CONTEXT_TOKENS:60000}

github.oauth.client-id=${GITHUB_CLIENT_ID:}
github.oauth.client-secret=${GITHUB_CLIENT_SECRET:}
github.oauth.redirect-uri=${GITHUB_REDIRECT_URI:http://localhost:8080/api/auth/github/callback}
github.oauth.token-uri=https://github.com/login/oauth/access_token
github.oauth.user-uri=https://api.github.com/user
github.oauth.user-emails-uri=https://api.github.com/user/emails

app.crypto.secret=${APP_CRYPTO_SECRET:dev-crypto-secret-minimum-32-characters-long!!}

# CORS: 로컬 프론트/Extension — 쉼표로 구분
app.security.cors-allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080,http://127.0.0.1:3000}
app.security.trust-x-forwarded-for=${TRUST_X_FORWARDED_FOR:false}

# 분당 요청 수 (IP 기준, 인메모리 — 인스턴스별)
app.security.rate-limit-general-per-minute=${RATE_LIMIT_GENERAL:120}
app.security.rate-limit-auth-per-minute=${RATE_LIMIT_AUTH:30}
app.security.rate-limit-llm-per-minute=${RATE_LIMIT_LLM:12}
