# --- 운영 전용: 아래 값은 반드시 환경 변수 / 시크릿 매니저로 주입 (기본값 없음) ---

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&sslMode=REQUIRED&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

aws.lambda.function-name=${AWS_LAMBDA_FUNCTION_NAME}
aws.lambda.region=${AWS_REGION:ap-northeast-2}

spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE}

app.blog.public-base-url=${APP_BLOG_PUBLIC_BASE_URL}
app.chat.max-context-tokens=${APP_CHAT_MAX_CONTEXT_TOKENS:60000}

github.oauth.client-id=${GITHUB_CLIENT_ID:}
github.oauth.client-secret=${GITHUB_CLIENT_SECRET:}
github.oauth.redirect-uri=${GITHUB_REDIRECT_URI:}
github.oauth.token-uri=https://github.com/login/oauth/access_token
github.oauth.user-uri=https://api.github.com/user
github.oauth.user-emails-uri=https://api.github.com/user/emails

app.crypto.secret=${APP_CRYPTO_SECRET}

# 운영 CORS: 실제 웹/Extension 출처만 (쉼표 구분). 와일드카드 https://* 사용 금지
app.security.cors-allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.security.trust-x-forwarded-for=${TRUST_X_FORWARDED_FOR:true}

app.security.rate-limit-general-per-minute=${RATE_LIMIT_GENERAL:60}
app.security.rate-limit-auth-per-minute=${RATE_LIMIT_AUTH:20}
app.security.rate-limit-llm-per-minute=${RATE_LIMIT_LLM:8}
