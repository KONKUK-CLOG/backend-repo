spring.application.name=clog



# Database Configuration (환경변수로 설정 가능)

spring.datasource.url=jdbc:mysql://${DB_HOST:clog-db.cfmkssq6u73l.ap-northeast-2.rds.amazonaws.com}:${DB_PORT:3306}/${DB_NAME:clog}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8

spring.datasource.username=${DB_USERNAME:root}

spring.datasource.password=${DB_PASSWORD:teamproject}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# JPA Configuration

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

spring.jpa.show-sql=${JPA_SHOW_SQL:true}

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect



# Server Configuration

server.port=${SERVER_PORT:8080}



# JWT (jjwt 0.12: HMAC 키는 최소 256비트 권장)

jwt.secret=${JWT_SECRET:clog-jwt-secret-key-must-be-at-least-32-bytes-long}

jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}



# AWS Lambda (LLM)

aws.lambda.function-name=${AWS_LAMBDA_FUNCTION_NAME:clog-llm-generator}

aws.lambda.region=${AWS_REGION:ap-northeast-2}



# MongoDB — 채팅 세션/메시지 저장

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/clog}

spring.data.mongodb.database=${MONGODB_DATABASE:clog}



# Extension 발행 후 블로그 공개 URL 조합 시 사용 (예: https://clog.example.com/blog/)

app.blog.public-base-url=${APP_BLOG_PUBLIC_BASE_URL:http://localhost:3000/blog}



# 채팅 컨텍스트 한도(토큰 추정치). 초과 시 Lambda로 요약 후 새 세션으로 전환

app.chat.max-context-tokens=${APP_CHAT_MAX_CONTEXT_TOKENS:60000}



# GitHub OAuth

github.oauth.client-id=${GITHUB_CLIENT_ID:}

github.oauth.client-secret=${GITHUB_CLIENT_SECRET:}

github.oauth.redirect-uri=${GITHUB_REDIRECT_URI:http://localhost:8080/api/auth/github/callback}

github.oauth.token-uri=https://github.com/login/oauth/access_token

github.oauth.user-uri=https://api.github.com/user

github.oauth.user-emails-uri=https://api.github.com/user/emails



# Crypto

app.crypto.secret=${APP_CRYPTO_SECRET:change-me-32-bytes-secret-key}


